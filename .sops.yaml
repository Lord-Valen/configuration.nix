keys:
  - &lord-valen-heracles 
  - &heracles 
  - &lord-valen-autolycus 
  - &autolycus 
  - &theseus 

creation_rules:
  - path_regex: modules/hosts/autolycus/secrets/.*
    key_groups:
      - age:
          - *lord-valen-heracles
          - *lord-valen-autolycus
          - *autolycus
  - path_regex: modules/hosts/heracles/secrets/.*
    key_groups:
      - age:
          - *lord-valen-heracles
          - *lord-valen-autolycus
          - *heracles
  - path_regex: modules/hosts/theseus/secrets/.*
    key_groups:
      - age:
          - *lord-valen-heracles
          - *lord-valen-autolycus
          - *theseus
